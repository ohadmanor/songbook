<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dynamic HTML Songbook</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <div class="app-container">
    
    <!-- Sidebar: Logo, Search, Song List -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div style="display: flex; align-items: center; gap: 0.5rem;">
          <span class="logo">ChordBook</span>
          <span style="font-size: 0.7rem; color: var(--text-secondary); font-weight: 700; background: var(--border-color); padding: 2px 6px; border-radius: 12px; border: 1px solid var(--border-color); line-height: 1;">v1.1.1</span>
        </div>
        <button class="btn mobile-menu-btn" id="hide-sidebar-btn" style="padding: 4px 8px; flex: none;">×</button>
      </div>
      
      <!-- Sidebar Tabs -->
      <div class="sidebar-tabs">
        <button class="tab-btn active" id="tab-songs-btn">Songs</button>
        <button class="tab-btn" id="tab-setlists-btn">Setlists</button>
      </div>
      
      <!-- Search Input -->
      <div class="search-container" id="search-container">
        <div class="search-wrapper">
          <!-- Search Icon SVG -->
          <svg class="search-icon" viewBox="0 0 24 24">
            <path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/>
          </svg>
          <input type="text" class="search-input" id="search-input" placeholder="Search by title, artist, key..." autocomplete="off">
        </div>
      </div>
      
      <!-- List of Songs -->
      <nav class="song-list-container" id="song-list"></nav>
      
      <!-- List of Setlists -->
      <nav class="song-list-container" id="setlist-list" style="display: none; padding: 0.5rem 1rem;"></nav>
      
      <!-- Active Setlist Editor -->
      <div id="setlist-editor" style="display: none; flex-direction: column; flex: 1; overflow: hidden; padding: 1rem; gap: 0.8rem;">
        <div style="display: flex; align-items: center; justify-content: space-between; gap: 0.3rem;">
          <button class="btn" id="setlist-back-btn" style="flex: none; padding: 4px 6px; font-size: 0.75rem;">← Back</button>
          <input type="text" id="setlist-name-input" class="form-control" style="font-weight: bold; font-size: 0.9rem; flex: 1; padding: 4px 6px;" placeholder="Setlist Name">
          <button class="btn" id="setlist-import-btn" style="flex: none; padding: 4px 6px; font-size: 0.75rem;" title="Import Setlist from JSON">Imp</button>
          <button class="btn" id="setlist-export-btn" style="flex: none; padding: 4px 6px; font-size: 0.75rem;" title="Export Setlist to JSON">Exp</button>
          <button class="btn" id="setlist-delete-btn" style="flex: none; padding: 4px 6px; font-size: 0.75rem; background: #ef4444; color: white; border-color: #ef4444;" title="Delete Setlist">Del</button>
        </div>
        
        <!-- Add song to setlist dropdown -->
        <div class="form-group" style="margin-bottom: 0;">
          <select id="setlist-add-song-select" class="form-control" style="font-size: 0.85rem; padding: 4px 8px; cursor: pointer;">
            <option value="">+ Add Song to Setlist...</option>
          </select>
        </div>
        
        <!-- Setlist songs list -->
        <div id="setlist-songs-container" style="flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 0.4rem;"></div>
      </div>
      
      <!-- Sidebar Action Footers -->
      <div class="sidebar-footer" id="songs-footer">
        <button class="btn btn-primary" id="new-song-btn">
          <!-- Plus Icon SVG -->
          <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor">
            <path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/>
          </svg>
          Add Song
        </button>
        <button class="btn" id="export-db-btn" title="Export all songs to JSON backup">
          Backup
        </button>
      </div>
      
      <div class="sidebar-footer" id="setlists-footer" style="display: none; gap: 0.5rem;">
        <button class="btn btn-primary" id="new-setlist-btn" style="padding: 0.6rem 0.8rem; font-size: 0.85rem; flex: 1;">
          <!-- Plus Icon SVG -->
          <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor">
            <path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/>
          </svg>
          Create Setlist
        </button>
        <button class="btn" id="main-import-setlist-btn" style="padding: 0.6rem 0.8rem; font-size: 0.85rem; flex: 1;">
          <!-- Import Icon SVG -->
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
            <polyline points="7 10 12 15 17 10"></polyline>
            <line x1="12" y1="15" x2="12" y2="3"></line>
          </svg>
          Import
        </button>
        <input type="file" id="setlists-import-file" accept=".json" style="display: none;">
      </div>
    </aside>

    <!-- Main View Panel -->
    <main class="main-panel">
      
      <!-- Toolbar Controls -->
      <header class="toolbar">
        <div style="display: flex; align-items: center; gap: 0.5rem; flex-wrap: wrap;">
          <button class="btn mobile-menu-btn" id="show-sidebar-btn" style="display: none;">
            <!-- Menu Icon SVG -->
            <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
              <path d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z"/>
            </svg>
          </button>
          <button class="btn" id="wake-lock-btn" title="Keep device screen awake during performance" style="flex: none;">
            Wake Lock <span class="wakelock-active-indicator" id="wakelock-indicator" style="display: none;"></span>
          </button>
          
          <!-- Toolbar Search -->
          <div class="search-wrapper" style="width: 200px; position: relative;">
            <svg class="search-icon" viewBox="0 0 24 24">
              <path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/>
            </svg>
            <input type="text" class="search-input" id="toolbar-search-input" placeholder="Search songs..." style="padding: 0.4rem 0.8rem 0.4rem 2.2rem; font-size: 0.85rem;" autocomplete="off">
            <div id="toolbar-search-dropdown" class="search-dropdown"></div>
          </div>
        </div>

        <!-- Zoom / Size controls -->
        <div class="control-group">
          <span class="control-label">Size</span>
          <button class="control-btn" id="font-dec-btn">-</button>
          <span class="control-value" id="font-size-val">1.0x</span>
          <button class="control-btn" id="font-inc-btn">+</button>
        </div>

        <!-- Transpose Controls -->
        <div class="control-group">
          <span class="control-label">Key</span>
          <button class="control-btn" id="transpose-dec-btn">-</button>
          <span class="control-value" id="transpose-val">0</span>
          <button class="control-btn" id="transpose-inc-btn">+</button>
          <button class="control-btn" id="enharmonic-toggle-btn" title="Toggle sharps (#) / flats (b)" style="font-size: 0.75rem; width: 22px;">#</button>
        </div>

        <!-- Auto Scroll controls -->
        <div class="control-group">
          <button class="btn autoscroll-btn" id="scroll-toggle-btn" style="padding: 4px 8px; flex: none;">Play</button>
          <span class="control-label" style="font-size: 0.65rem; margin-left: 0.2rem;">Speed</span>
          <input type="range" id="scroll-speed-slider" min="1" max="5" value="3" style="width: 60px; cursor: pointer;">
        </div>

        <!-- Metronome controls -->
        <div class="control-group">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" style="color: var(--text-secondary); margin-right: 0.2rem; flex-shrink: 0;" title="Metronome">
            <path d="M12 2L2 22h20L12 2z"></path>
            <path d="M12 5v13"></path>
            <circle cx="12" cy="18" r="1"></circle>
            <path d="M16 11l-4 4"></path>
          </svg>
          <span class="metro-led" id="metro-led" style="width: 8px; height: 8px; border-radius: 50%; background-color: var(--text-secondary); display: inline-block; margin-right: 0.2rem; transition: background-color 0.05s ease, box-shadow 0.05s ease; flex-shrink: 0;"></span>
          <button class="control-btn" id="metro-toggle-btn" title="Toggle Metronome Mode (Off / Visual / Audio)" style="font-size: 0.8rem; width: auto; padding: 0 4px; margin-right: 0.2rem; flex-shrink: 0;">🔇</button>
          <button class="control-btn" id="metro-bpm-dec-btn" style="width: 20px; height: 20px; font-size: 0.75rem; flex-shrink: 0;">-</button>
          <span class="control-value" id="metro-bpm-val" style="font-size: 0.8rem; min-width: 28px; flex-shrink: 0;">120</span>
          <button class="control-btn" id="metro-bpm-inc-btn" style="width: 20px; height: 20px; font-size: 0.75rem; flex-shrink: 0;">+</button>
          <select class="select-theme" id="metro-beats-select" style="font-size: 0.75rem; padding: 2px 4px; width: 44px; cursor: pointer; margin-left: 0.2rem; flex-shrink: 0;">
            <option value="4">4/4</option>
            <option value="3">3/4</option>
            <option value="2">2/4</option>
            <option value="6">6/8</option>
          </select>
        </div>

        <!-- Setlist Selection -->
        <div class="control-group">
          <span class="control-label">Setlist</span>
          <select class="select-theme" id="toolbar-setlist-select" style="width: 100px; max-width: 120px;">
            <option value="">None</option>
          </select>
        </div>

        <!-- Chord Schema Selection -->
        <div class="control-group">
          <span class="control-label">Chords</span>
          <select class="select-theme" id="instrument-select" style="width: 85px;">
            <option value="guitar">Guitar</option>
            <option value="piano">Piano</option>
          </select>
        </div>

        <!-- Theme Selection -->
        <div class="control-group">
          <span class="control-label">Theme</span>
          <select class="select-theme" id="theme-select">
            <option value="light">Light</option>
            <option value="dark">Dark</option>
            <option value="sepia">Sepia</option>
            <option value="oled">OLED Black</option>
          </select>
        </div>
      </header>

      <!-- Content Viewer -->
      <section class="song-viewport" id="song-viewport">
        <!-- Rendered song layout lands here -->
        <div id="song-display-area"></div>
      </section>

    </main>

  </div>

  <!-- Chord Diagram Floating Tooltip -->
  <div class="chord-tooltip" id="chord-tooltip"></div>

  <!-- Add/Edit Song Modal -->
  <div class="modal-overlay" id="song-modal">
    <div class="modal-content">
      <div class="modal-header">
        <h2 id="modal-title">Add New Song</h2>
        <button class="btn" id="close-modal-btn" style="border: none; padding: 4px 8px; font-size: 1.2rem; cursor: pointer;">×</button>
      </div>
      <div class="modal-body">
        <input type="hidden" id="edit-song-id">
        
        <div class="form-group" id="import-docx-group">
          <label for="form-import-file" style="display: flex; justify-content: space-between; align-items: center;">
            <span>Import from Word (.docx)</span>
            <span id="import-status" style="font-size: 0.75rem; font-weight: normal; color: var(--accent-color);"></span>
          </label>
          <input type="file" id="form-import-file" accept=".docx" class="form-control" style="cursor: pointer; padding: 0.4rem;">
        </div>
        
        <div class="form-group">
          <label for="form-title">Song Title</label>
          <input type="text" class="form-control" id="form-title" placeholder="e.g. Hotel California" required>
        </div>
        
        <div class="form-group">
          <label for="form-artist">Artist / Performer</label>
          <input type="text" class="form-control" id="form-artist" placeholder="e.g. Eagles">
        </div>
        
        <div class="form-group" style="display: flex; flex-direction: row; align-items: center; justify-content: space-between;">
          <div class="form-group" style="flex: 1; margin-right: 1rem;">
            <label for="form-key">Original Key</label>
            <input type="text" class="form-control" id="form-key" placeholder="e.g. Am">
          </div>
          <div class="form-group" style="flex: 1; flex-direction: row; align-items: center; gap: 0.5rem; margin-top: 1.1rem;">
            <input type="checkbox" id="form-rtl" style="width: 18px; height: 18px; cursor: pointer;">
            <label for="form-rtl" style="cursor: pointer; margin-bottom: 0;">Right-to-Left (Hebrew)</label>
          </div>
        </div>
        
        <div class="form-group">
          <label for="form-text">Lyrics and Chords Sheet</label>
          <textarea class="form-control textarea-control" id="form-text" placeholder="Type chords directly above lyrics with spaces, like this:&#10;Am             C&#10;This is an example song" required></textarea>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn" id="delete-song-btn" style="background-color: #ef4444; color: white; border-color: #ef4444; display: none;">Delete</button>
        <div style="flex: 1;"></div>
        <button class="btn" id="cancel-modal-btn">Cancel</button>
        <button class="btn btn-primary" id="save-song-btn">Save Song</button>
      </div>
    </div>
  </div>

  <!-- Toast Notification Overlay -->
  <div class="toast" id="toast-notify">Action Successful</div>

  <!-- JavaScript Modules -->
  <script src="jszip.min.js"></script>
  <script src="transposer.js"></script>
  <script src="chord-db.js"></script>
  <script src="songs-data.js"></script>
  <script src="parser.js"></script>
  <script src="app.js"></script>
</body>
</html>
